# Nginx reverse proxy for no-vain-years-mono server (M1 A-Tight v2 single-node).
#
# `/etc/letsencrypt` is mounted from the nvy-letsencrypt Docker volume; cert
# files are placed there by certbot on the host (reused from the meta era — same
# api.xiaocaishen.me cert; see prod cutover runbook).
#
# default_server on 80/443 returns 444 to bare-IP / unknown-Host hits — avoids
# leaking the app to IP scanners and forces real traffic through the
# api.xiaocaishen.me virtual host. Exception: /healthz returns plain "ok" so the
# nginx container's docker healthcheck (`wget http://localhost/healthz`, no Host
# header -> matches default_server) can flip the container to "healthy".

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 444;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;
    # Real cert reused; default_server returns 444 before any body is exchanged.
    ssl_certificate /etc/letsencrypt/live/api.xiaocaishen.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.xiaocaishen.me/privkey.pem;
    return 444;
}

# Plain HTTP for api.xiaocaishen.me — redirect to HTTPS, allow acme-challenge.
server {
    listen 80;
    listen [::]:80;
    server_name api.xiaocaishen.me;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination + reverse proxy to the NestJS app (port 3000).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.xiaocaishen.me;

    ssl_certificate /etc/letsencrypt/live/api.xiaocaishen.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.xiaocaishen.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS — opt in once cert renewal is verified working.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prometheus metrics endpoint is internal-only — block from the public edge.
    location = /metrics {
        return 404;
    }

    # Reverse proxy everything else to the NestJS app.
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}

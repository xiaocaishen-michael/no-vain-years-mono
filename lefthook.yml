extends:
  - ./lefthook.preset-mono-orchestrator-ready.yml
  - ./lefthook.preset-adr-governance.yml

# Lefthook config — mono single-source (per docs/conventions/sdd.md).
# 强制层 commit-time 硬拦:`tasks-md-drift` 拒"commit 含 impl 代码但 tasks.md 未 staged"。
# `--no-verify` 仅限格式化 / typo / 紧急 hotfix 出口。

# Conventional Commits enforcement at commit time.
# Mirrors meta-repo behavior — full ruleset (header/body/footer max-length,
# config-conventional types) shared via commitlint.config.mjs;CI runs the
# same check via wagoid/commitlint-github-action. PR title also validated
# by amannn/action-semantic-pull-request (load-bearing for squash merge:
# PR title becomes commit message).
commit-msg:
  commands:
    conventional-format:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    format:
      tags: format
      # Prettier 重写 staged 文件并 re-stage (stage_fixed: true)。
      # 与其他 pre-commit 命令并行运行 — Prettier 仅改格式（空白/换行/引号），
      # tasks-md-drift / no-bad-mocks / docs-organization-drift 都不读会变的内容。
      glob: '*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,md,yml,yaml}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    gitleaks:
      tags: security
      # Per ADR-0037 § 1 — staged-only scan with shared .gitleaks.toml ruleset.
      # `protect --staged` reads the git index directly (not {staged_files}),
      # avoiding the lefthook template quote-stripping pitfall.
      # CI mirror: .github/workflows/ci.yml gitleaks job runs `detect` on full
      # history. Emergency exit: git commit --no-verify.
      run: gitleaks protect --staged --no-banner --config .gitleaks.toml

    check-env-sync:
      tags: security
      glob: '{**/.env,**/.env.example}'
      # Per ADR-0037 § 2 — trigger only on .env / .env.example diffs to keep
      # the typical commit fast (script walks apps/**/*.ts once). Algorithm:
      # K_example == K_env per pair + process.env refs ⊆ K_example ∪ ALLOWLIST.
      run: pnpm tsx scripts/check-env-sync.ts

    prisma-generate-gate:
      tags: data
      glob: 'apps/server/prisma/schema.prisma'
      # Per ADR-0035 § 2 — staged schema.prisma → auto regenerate client.
      # Generated output is gitignored (apps/server/.gitignore /src/generated/prisma),
      # so we don't need to re-stage anything. The gate's value is: if the schema
      # changed and `prisma generate` fails (invalid schema, dialect break), the
      # commit aborts here instead of failing later in CI / runtime.
      run: pnpm -C apps/server prisma generate

    migration-naming-check:
      tags: data
      # Per ADR-0035 § 1 — new migration directories under apps/server/prisma/migrations/
      # MUST match `<yyyymmddhhmm>_<verb_obj>` (12-digit timestamp + underscore + slug).
      # Existing historical names (0_init, 1_add_outbox_event, ...) are immutable;
      # check only --diff-filter=A new additions, mirroring docs-organization-drift.
      # Use `pnpm db:migrate "<verb obj>"` wrapper to auto-prepend timestamp.
      run: |
        set -eu
        new_migs=$(git diff --cached --name-only --diff-filter=A \
          | grep -E '^apps/server/prisma/migrations/[^/]+/migration\.sql$' \
          | sed -E 's|^apps/server/prisma/migrations/([^/]+)/.*$|\1|' \
          | sort -u \
          || true)
        if [ -z "$new_migs" ]; then
          exit 0
        fi
        invalid=""
        while IFS= read -r dir; do
          if ! echo "$dir" | grep -qE '^[0-9]{8}_[0-9]{4}_[a-z][a-z0-9_]*$'; then
            invalid="${invalid}${dir}\n"
          fi
        done <<< "$new_migs"
        if [ -z "$invalid" ]; then
          exit 0
        fi
        echo "❌ migration-naming-check: 新增 migration 目录名违反 ADR-0035 § 1"
        echo ""
        echo "Invalid directories:"
        printf "$invalid" | sed 's/^/  - /'
        echo ""
        echo "约束: <yyyymmddhhmm>_<verb_obj>  (e.g. 20260520_1430_add_phone_to_account)"
        echo "wrapper: pnpm db:migrate \"add phone to account\"  (auto-prepends timestamp)"
        echo ""
        echo "Historical names (0_init / 1_add_outbox_event / ...) 是 immutable 不追溯."
        echo "紧急出口: git commit --no-verify"
        exit 1

    tasks-md-drift:
      tags: sdd
      # 三段检查:
      #  1. impl detection: apps|packages/.../*.ts(x), 排 .spec/.test/.it.spec (TDD 红测同 task,合规)
      #  2. tasks.md staged: specs/*/tasks.md 任一 staged 即放行
      #  3. pending detection: 仓库内任一 specs/*/tasks.md 含未完成 "- [ ] T<N>" 行
      # impl && !tasks_staged && pending → block + 列证据
      # 避开 lefthook {staged_files} 模板替换吞引号问题,直接 git diff --cached
      run: |
        set -eu
        staged=$(git diff --cached --name-only --diff-filter=ACMR)
        impl=$(echo "$staged" \
          | grep -E '^(apps|packages)/.*\.(ts|tsx)$' \
          | grep -vE '\.(spec|test|it\.spec)\.tsx?$' \
          || true)
        if [ -z "$impl" ]; then
          exit 0
        fi
        tasks_staged=$(echo "$staged" | grep -E '^specs/.+/tasks\.md$' || true)
        if [ -n "$tasks_staged" ]; then
          exit 0
        fi
        pending=$(grep -lE '^[[:space:]]*-[[:space:]]+\[ \][[:space:]]+T[0-9]+' \
          specs/*/tasks.md 2>/dev/null \
          || true)
        if [ -z "$pending" ]; then
          exit 0
        fi
        echo "❌ tasks-md-drift: impl code 改动但无 tasks.md 同 stage"
        echo ""
        echo "Staged impl files:"
        echo "$impl" | sed 's/^/  - /'
        echo ""
        echo "Specs with pending [ ] T<N> tasks (对应 task ship 时需 flip):"
        echo "$pending" | sed 's/^/  - /'
        echo ""
        echo "请把对应 tasks.md 中 task 行 \`- [ ] T<N>\` flip \`- [X] T<N>\` 后同 stage."
        echo "格式化 / typo / 紧急 hotfix 出口: git commit --no-verify"
        exit 1

    no-bad-mocks:
      tags: test, quality
      # Per ADR-0040 multi-layer test gate (门禁层 / PR-T3).
      # 扫 staged *.{guard,interceptor,filter,pipe,repository}.spec.ts;
      # 命中 `new \w+(Guard|Interceptor|Filter|Pipe|Repository)\b\s*\(`
      # 但全文无 `createTestingModule` → 拒提交 (PR-79 retro Pattern B
      # — mock-only test 掩盖 lifecycle 错误).
      #
      # Regex narrow 设计 (per sub-plan 3 § A): 不命中 `new SomeException(`
      # / `new Error(` / `new Date(` 等 value-class 实例化,只命中以
      # NestJS lifecycle 后缀结尾的 class. grep 验过现有 specs 不误伤。
      #
      # Known existing violation: apps/server/src/security/problem-detail.filter.spec.ts
      # 含 `new ProblemDetailFilter(mockCls)` 不带 createTestingModule;
      # 本 hook 阻**对该文件的未来 commit**,作者修该 spec 时必须改用
      # createTestingModule (defensive design,不追溯既有 committed code)。
      #
      # 紧急出口: git commit --no-verify
      run: |
        set -eu
        staged=$(git diff --cached --name-only --diff-filter=ACMR \
          | grep -E '\.(guard|interceptor|filter|pipe|repository)\.spec\.ts$' \
          || true)
        if [ -z "$staged" ]; then
          exit 0
        fi
        violations=""
        for f in $staged; do
          if [ ! -f "$f" ]; then
            continue
          fi
          if grep -qE 'new[[:space:]]+[A-Za-z_][A-Za-z0-9_]*(Guard|Interceptor|Filter|Pipe|Repository)[[:space:]]*\(' "$f" \
             && ! grep -qE 'createTestingModule[[:space:]]*\(' "$f"; then
            violations="${violations}${f}\n"
          fi
        done
        if [ -z "$violations" ]; then
          exit 0
        fi
        echo "❌ no-bad-mocks: 拦截 lifecycle component 隔离实例化测试"
        echo ""
        echo "Violating files (含 new \\w+(Guard|Interceptor|Filter|Pipe|Repository)\\b\\s*\\("
        echo "但全文无 createTestingModule):"
        printf "$violations" | sed 's/^/  - /'
        echo ""
        echo "原因 (per ADR-0040 multi-layer test gate / PR-79 retro Pattern B):"
        echo "  NestJS Guard / Interceptor / Filter / Pipe / Repository 子类"
        echo "  必须用 Test.createTestingModule({ imports: [<TheModule>] }).compile()"
        echo "  装 DI 容器测试;\`new MyGuard()\` 隔离实例化抹掉 lifecycle 顺序"
        echo "  (PR #79 实证: CLS interceptor mode 漏 Guards/Filters 类 cascade bug)"
        echo ""
        echo "紧急出口: git commit --no-verify (格式化 / typo / 紧急 hotfix)"
        exit 1

    docs-organization-drift:
      tags: docs
      # 检查新增 (--diff-filter=A) 的 docs/{plans,experience}/*.md 是否符合
      # YYYY-MM/MM-DD-<kebab-slug>.md 路径格式 (per docs/conventions/docs-organization.md)
      # 存量 (M / R) 不检；status=A only。
      run: |
        set -eu
        new_docs=$(git diff --cached --name-only --diff-filter=A \
          | grep -E '^docs/(plans|experience)/.*\.md$' \
          || true)
        if [ -z "$new_docs" ]; then
          exit 0
        fi
        invalid=$(echo "$new_docs" \
          | grep -vE '^docs/(plans|experience)/[0-9]{4}-[0-9]{2}/[0-9]{2}-[0-9]{2}-[a-z0-9-]+\.md$' \
          || true)
        if [ -z "$invalid" ]; then
          exit 0
        fi
        echo "❌ docs-organization-drift: 新增 plan/experience 文件未按 convention 命名"
        echo ""
        echo "Invalid files:"
        echo "$invalid" | sed 's/^/  - /'
        echo ""
        echo "约束（per docs/conventions/docs-organization.md）："
        echo "  路径格式: docs/{plans,experience}/YYYY-MM/MM-DD-<kebab-slug>.md"
        echo "  示例:     docs/plans/2026-05/05-21-archive-memory-bridge.md"
        echo ""
        echo "存量豁免: 已有文件不受约束 (hook 只查 status=A 新增)"
        echo "紧急出口: git commit --no-verify"
        exit 1

    adr-index-check:
      tags: adr governance docs
      # Per ADR-0031 § ADR 修订策略 / realign-P1 PR-1 — docs/adr/README.md
      # 「现状索引」table must stay in sync with each ADR's frontmatter `status`.
      # Complements the preset's adr-frontmatter-check (which validates each file
      # in isolation) with a holistic README↔frontmatter consistency gate.
      # Lives here, not in lefthook.preset-adr-governance.yml — that preset file
      # is auto-generated ("do not edit by hand"); this gate is mono-local.
      # glob fires on ANY docs/adr/*.md change (new ADR, status flip, README
      # edit); the script ignores args and always full-scans (consistency is
      # holistic). Local-only gate like adr-frontmatter-check; --no-verify exits.
      glob: 'docs/adr/*.md'
      run: pnpm tsx scripts/check-adr-index.ts

    markdownlint:
      tags: lint
      # Per memory feedback_markdownlint_preflight — pre-flight catches
      # MD028/MD031/MD040/MD025 etc. before push 省 CI cycle.
      # Config single source: .markdownlint-cli2.jsonc (MD032 disabled per
      # 47-error research — markdownlint 自创防御规则 prettier preset 默认 disable).
      # CI mirror: .github/workflows/ci.yml markdownlint job runs same config
      # (DavidAnson/markdownlint-cli2-action@v18). Hook uses npx -y to skip
      # devDep install + match meta-server lefthook pattern; first-run downloads
      # ~10s, subsequent npm cache hit ~1-2s (within feedback_avoid_slow_pre_commit_or_pre_push budget).
      # Emergency exit: git commit --no-verify (typo / 紧急 hotfix only).
      glob: '*.md'
      run: npx -y markdownlint-cli2 {staged_files}

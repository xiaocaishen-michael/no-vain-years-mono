id: mono-orchestrator-ready
version: 0.2.1
description: |
  mono-repo spec-kit 自动编排 + 执行支持。把 spec / plan / tasks 三大 template
  升级到 orchestrator-friendly 形态:

    - YAML frontmatter (跨文档级元数据)
    - JSON fenced block (宏观架构 / 沙盒配置 / API contracts)
    - HTML 注释内塞 JSON marker (微观 DAG / per-task meta)
    - Zod schema 校验契约 (.specify/schemas/mono-orchestrator-ready/spec.zod.ts)

  0.2.0 增量 (post-A-002 retro):
    - spec frontmatter v2 字段: web_compat / agent_friction_observed
      / agent_friction_notes / perf_budgets[] (per ADR-0027 / ADR-0024 amend
      / ADR-0039)
    - schemas/spec.zod.ts (Zod schema, 校验 frontmatter v2 含 web_compat
      条件 required 等 invariant)
    - scripts/check-spec-frontmatters.ts (gray-matter + zod, 扫 staged
      specs/*/spec.md, schema 不符 → exit 1)
    - lefthook.yml.fragment (spec-frontmatter-check hook, glob
      specs/*/spec.md)

  0.2.1 增量 (post-A-002 PR-1 follow-up):
    - plan-template 加 ## Phase 0 Research Gates 段 (4 gates):
      · Integration Smoke Gate (server real-boot + mobile golden-path walked)
      · Cross-stack Vendor Intersection 6Q Card (新 third-party 包决策)
      · Legacy → Mono Delta Sweep Checklist (meta-repo 迁入代码 stale ref grep)
      · ADR-deferred-mitigation Scan Step (Open Questions 分类 + 缓解)

  配合 scripts/orchestrator/*.ts 使用。仅适用于 monorepo (nx workspaces),
  因为 orchestrator 需要在单仓内同时调度 server / api-client / mobile 多 workspace。

  NOT a SKILL fork — `.claude/skills/speckit-*/SKILL.md` 保持 vanilla;
  采用 spec-kit 0.8.7+ 原生 template `replace` 策略。
applies_to: [mono]
spec_kit_compat: ">=0.8.5,<0.10.0"
priority: 4

provides:
  templates:
    - name: spec-template
      type: template
      strategy: replace
      file: templates/spec-template.md
    - name: plan-template
      type: template
      strategy: replace
      file: templates/plan-template.md
    - name: tasks-template
      type: template
      strategy: replace
      file: templates/tasks-template.md
  schemas:
    - file: schemas/spec.zod.ts
      description: spec.md frontmatter Zod schema (v2 — conditional invariants)
  scripts:
    - file: scripts/check-spec-frontmatters.ts
      description: scan staged spec.md, validate against spec.zod, exit 1 on fail
  lefthook:
    - file: lefthook.yml.fragment
      hook: pre-commit/spec-frontmatter-check
      target_glob: "specs/*/spec.md"

# Target repo runtime requires:
#   - Node 22+ (used by tsx / fs.readdirSync recursion)
#   - pnpm-installed root devDeps: zod ^3, gray-matter ^4, tsx ^4

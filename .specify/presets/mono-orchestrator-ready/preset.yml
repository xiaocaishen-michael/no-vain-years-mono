id: mono-orchestrator-ready
version: 0.4.0
description: |
  mono-repo spec-kit 自动编排 + 执行支持。把 spec / plan / tasks 三大 template
  升级到 orchestrator-friendly 形态:

    - YAML frontmatter (跨文档级元数据)
    - JSON fenced block (宏观架构 / 沙盒配置 / API contracts)
    - HTML 注释内塞 JSON marker (微观 DAG / per-task meta)
    - Zod schema 校验契约 (.specify/schemas/mono-orchestrator-ready/spec.zod.ts)

  0.2.0 增量 (post-A-002 retro):
    - spec frontmatter v2 字段: web_compat / agent_friction_observed
      / agent_friction_notes / perf_budgets[] (per ADR-0027 / ADR-0024 amend
      / ADR-0039)
    - schemas/spec.zod.ts (Zod schema, 校验 frontmatter v2 含 web_compat
      条件 required 等 invariant)
    - scripts/check-spec-frontmatters.ts (gray-matter + zod, 扫 staged
      specs/*/spec.md, schema 不符 → exit 1)
    - lefthook.yml.fragment (spec-frontmatter-check hook, glob
      specs/*/spec.md)

  0.2.1 增量 (post-A-002 PR-1 follow-up):
    - plan-template 加 ## Phase 0 Research Gates 段 (4 gates):
      · Integration Smoke Gate (server real-boot + mobile golden-path walked)
      · Cross-stack Vendor Intersection 6Q Card (新 third-party 包决策)
      · Legacy → Mono Delta Sweep Checklist (meta-repo 迁入代码 stale ref grep)
      · ADR-deferred-mitigation Scan Step (Open Questions 分类 + 缓解)

  0.2.2 增量 (PR-T1 / ADR-0040 multi-layer test gate strategy):
    - spec-template: state_branches v2 字段 — 强制 spec 阶段穷举状态分支
      (per PR #79 retro Pattern D 漏 cold-boot 状态实证)
    - plan-template:
      · orchestrator_config.verify_commands 加 "smoke" key (指向
        scripts/ci/server-boot-smoke.ts)
      · Architecture Notes 段加 🚨 Testing Invariants 3 禁令 (NO LIFECYCLE
        MOCKING / MANDATORY INTEGRATION / EXHAUSTIVE BRANCHING),
        orchestrator inject 进 LLM prompt 时硬性约束
    - tasks-template: kind 枚举扩 "verification";verify_kind 扩 "smoke";
      Server section 加 T003 Runtime Smoke 终极任务模板
    - schemas/spec.zod.ts: state_branches optional 字段 (0.3.0 转 required)

  0.3.0 增量 (PR-T3 / ADR-0040 门禁层):
    - schemas/spec.zod.ts: state_branches optional → required (.min(1))
    - specs/001-phone-sms-auth/spec.md + specs/002-account-profile/spec.md
      同 PR backfill state_branches 字段 (per master plan Risk row)
    - 配合 PR template (.github/pull_request_template.md) + lefthook
      no-bad-mocks + .github/workflows/pr-validation.yml + nightly-sweep.yml
      形成完整 L3 门禁体系

  0.3.1 增量 (PR-T3 follow-up P5 / Cargo-cult 防火墙):
    - plan-template.md 加 ## Dependencies & Defensive Additions 段, 强制
      列出所有新依赖 / polyfill / defensive import + fact-check 锚点 URL,
      防 PR #79 retro Pattern F (defensive cargo-cult, 抄过时教程的
      polyfill / config)

  0.4.0 增量 (ADR-0043 扁平+贫血范式对齐):
    - spec-template: 删 entities 块 DDD 词汇 (aggregate_root 字段移除 + domain
      "DDD subdomain" 改义为 owning-module 标签)
    - plan-template:
      · module_boundaries 注释改 eslint-plugin-boundaries (per ADR-0032 /
        ADR-0043; ADR-0020 superseded), 去 @nx/enforce-module-boundaries
      · orchestrator_config 路径修扁平 src/<module> (去 src/modules/<module>),
        去不存在的 libs/db import
      · Testing Invariants + General Architecture Notes 去 Repository / entity
        layer 旧范式残留
      · General Architecture Notes 加 ⚠️ CRITICAL ADR-0043 范式 banner
        (Flat + Anemic + Moat, fierce NEVER/MUST), orchestrator inject 进
        implement prompt
    - tasks-template: task-meta files 路径修扁平 src/<module>

  配合 scripts/orchestrator/*.ts 使用。仅适用于 monorepo (nx workspaces),
  因为 orchestrator 需要在单仓内同时调度 server / api-client / mobile 多 workspace。

  NOT a SKILL fork — `.claude/skills/speckit-*/SKILL.md` 保持 vanilla;
  采用 spec-kit 0.8.7+ 原生 template `replace` 策略。
applies_to: [mono]
spec_kit_compat: ">=0.8.5,<0.10.0"
priority: 4

provides:
  templates:
    - name: spec-template
      type: template
      strategy: replace
      file: templates/spec-template.md
    - name: plan-template
      type: template
      strategy: replace
      file: templates/plan-template.md
    - name: tasks-template
      type: template
      strategy: replace
      file: templates/tasks-template.md
  schemas:
    - file: schemas/spec.zod.ts
      description: spec.md frontmatter Zod schema (v2 — conditional invariants)
  scripts:
    - file: scripts/check-spec-frontmatters.ts
      description: scan staged spec.md, validate against spec.zod, exit 1 on fail
  lefthook:
    - file: lefthook.yml.fragment
      hook: pre-commit/spec-frontmatter-check
      target_glob: "specs/*/spec.md"

# Target repo runtime requires:
#   - Node 22+ (used by tsx / fs.readdirSync recursion)
#   - pnpm-installed root devDeps: zod ^3, gray-matter ^4, tsx ^4

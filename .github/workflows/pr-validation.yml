name: PR Validation

# Per ADR-0040 multi-layer test gate (PR-T3 / 门禁层 / 云端主防线).
# Single mega-job 'validate-and-test' that:
#   1. Enforces 3 hard checkboxes in PR body (`### 🚨 部署与存活前置确认`
#      section). Body is fetched via `github.rest.pulls.get` (LIVE), NOT
#      `context.payload.pull_request.body` (which is a webhook snapshot
#      frozen at workflow-trigger time — gh pr edit does not update it
#      and gh run rerun reuses the stored payload → eternal red).
#      See docs/conventions/pr-creation-protocol.md § 出错恢复路径.
#   2. Runs `nx affected -t lint typecheck test build runtime-smoke`
#      with `--base=origin/main` for incremental cascade detection.
#      `fetch-depth: 0` ensures nx can compute affected vs base.
# `types: [..., edited]` lets `gh pr edit --body` wake a fresh run so
# author can recover from a body regression without close+reopen dance.
# Trade-off: title / body / any PR-field edit triggers full pipeline
# (~5-15 min). DO NOT skip heavy steps on `edited` events via
# `if: github.event.action != 'edited'` — branch protection takes the
# latest check run for the head SHA, so a green `edited` run would
# silently overwrite a red `synchronize` run and let bad code merge.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-and-test:
    name: validate-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright browsers required by mobile runtime-smoke target (nx affected
      # cascades into mobile when api-client or shared types touched). `pnpm install`
      # does not auto-fetch browsers; without this step nx affected runtime-smoke
      # fails with "Executable doesn't exist at .cache/ms-playwright/chromium_headless_shell".
      # `--with-deps` adds system libs (libnss3 / libnspr4 / ...) required by Linux runner.
      # Limit to `chromium` — runtime-smoke config only targets Desktop Chrome.
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Enforce PR Checkboxes
        uses: actions/github-script@v7
        with:
          script: |
            // LIVE fetch — `context.payload.pull_request.body` is the
            // webhook snapshot frozen at trigger time. `gh pr edit` does
            // not update it, and `gh run rerun` reuses the same stored
            // payload, so a body-fix → rerun loop never escapes red.
            // Always fetch the current PR resource so edit-then-rerun
            // (or the `edited` trigger) reads the latest body.
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            // Bypass: release-please bot's Release PRs (label
            // `autorelease: pending`) carry auto-generated CHANGELOG
            // bodies — no deploy gate section by design (per ADR-0042).
            // They're pure version-bump PRs, no code change requires
            // smoke test verification. Enforcing the gate would BLOCK
            // them permanently. Label-based detection is reliable across
            // token modes (GITHUB_TOKEN bot author vs PAT-as-user author).
            const labels = (pr.labels || []).map(l => l.name);
            if (labels.includes('autorelease: pending')) {
              core.info('⏭ Skipped: release-please Release PR (autorelease: pending label).');
              return;
            }
            const body = pr.body || '';
            // Match `### 🚨 部署与存活前置确认` header and consume until
            // the next `## ` (H2) or `### ` (H3) header, or EOF.
            // `###?` = 2 or 3 hashes; `\n.*\s` boundary prevents matching
            // `##` mid-line. Critical: matching `## ` is required because
            // `## Test plan` immediately follows the gate section in the
            // template — without H2 boundary, Test plan `- [ ]` entries
            // (post-merge follow-ups) would false-fail the gate.
            const checklistRegex = /### 🚨 部署与存活前置确认[\s\S]*?(?=\n###?\s|$)/;
            const match = body.match(checklistRegex);
            if (!match) {
              core.setFailed('🚨 拦截成功：未找到 `### 🚨 部署与存活前置确认` 区块。PR body 可能被 Claude Code 默认 HEREDOC 覆盖,请从 .github/pull_request_template.md 拷贝完整 section（详见 docs/conventions/pr-creation-protocol.md）。');
              return;
            }
            if (match[0].includes('- [ ]')) {
              core.setFailed('🚨 拦截成功：`### 🚨 部署与存活前置确认` 区域含未勾选项,本地物理验证通过后再勾全部 checkbox。');
              return;
            }
            core.info('✅ All deployment & smoke gate checkboxes ticked (live body fetch).');

      - name: Generate Prisma client
        working-directory: apps/server
        run: npx prisma generate

      - name: Enforce migration immutability (per ADR-0035 + .claude/rules/migration-rules.md)
        # Per ADR-0035 § 1 + .claude/rules/migration-rules.md § 1 — 已合 main migration
        # is immutable; fix via new migration not modify existing. lefthook
        # migration-naming-check only catches diff-filter=A (new); this CI step
        # catches diff-filter=MD (modified/deleted) vs origin/main, complementary.
        # Requires fetch-depth: 0 (already set in actions/checkout above).
        run: |
          modified=$(git diff origin/main --diff-filter=MD --name-only \
            | grep -E '^apps/server/prisma/migrations/[^/]+/migration\.sql$' \
            || true)
          if [ -n "$modified" ]; then
            echo "❌ Migration immutability violation: existing migration(s) modified/deleted vs origin/main"
            # Use awk instead of `sed 's/^/  - /'` per shellcheck SC2001 +
            # actionlint. awk handles per-line prefix without invoking sed regex.
            echo "$modified" | awk '{print "  - " $0}'
            echo ""
            echo "Per ADR-0035 § 1 + .claude/rules/migration-rules.md § 1 — 已合 main migration 禁修改；纠正以 new migration 实现。"
            exit 1
          fi
          echo "✅ No prisma migration immutability violation."

      - name: Enforce server bounded-context moat (per Plan 05-24 R-6 / ADR-0043 §5 + ADR-0034 Stage C)
        # ts-morph AST 探针, 机器强制两条 boundaries-ESLint 看不见的边界:
        #   1. 跨 bounded context 的 Prisma model 访问 (写禁 / 读需 // CROSS-CONTEXT-READ);
        #   2. 跨业务 ctx 构造器注入参数需 // CROSS-CONTEXT-{SYNC,ASYNC,READ} 注释。
        # lefthook server-moat-check 的云端镜像 (--no-verify 绕不过这里)。Full-scan,
        # 不依赖 nx affected — 护城河是 holistic invariant。Not a new ruleset context:
        # runs inside the required validate-and-test job, no ruleset change needed.
        run: pnpm tsx scripts/checks/check-server-moat.ts

      - name: Enforce orchestrator consumption contract (per orchestrator-command-parity p1)
        # Pins command-flow features to the orchestrator parser/schema contract:
        # a feature is enforced iff its plan.md declares `orchestrator_config`;
        # manual-SDD features skip by construction. Full-scan (not nx affected —
        # specs/ isn't an nx project, so a spec-only edit wouldn't trigger the
        # orchestrator test target). lefthook orchestrator-parse-gate 的云端镜像
        # (--no-verify 绕不过这里). Runs inside the required validate-and-test job,
        # no ruleset change needed.
        run: pnpm tsx scripts/orchestrator/parse-gate.ts

      - name: Enforce e2e seed-auth backend boundary (per 05-29-e2e-backend-boundary-hardening P1)
        # Every seed-authed Expo Web e2e spec (addInitScript + nvy-auth) MUST
        # intercept GET /me (mockJson GET stub or raw page.route on /me), else
        # boot useMe leaks to a real :3000 → env-dependent flake (profile.spec.ts
        # was the named regression). lefthook e2e-seed-auth-mock-check 的云端镜像
        # (--no-verify 绕不过这里). Full-scan, not nx affected — hermeticity is a
        # holistic invariant. Runs inside the required validate-and-test job, no
        # ruleset change needed.
        run: pnpm tsx scripts/checks/check-e2e-seed-auth-mock.ts

      - name: Run Nx Affected Pipeline
        # base=origin/main for PR diff; nx affected computes which projects'
        # cache hashes change, triggers lint/typecheck/test/build/runtime-smoke
        # only for affected. cross-package wiring (api-client implicitDeps,
        # mobile static dep) makes single server-file change cascade to
        # api-client + mobile per ADR-0040 P2 design.
        run: pnpm exec nx affected -t lint typecheck test build runtime-smoke --base=origin/main

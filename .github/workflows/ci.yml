name: CI

# Per ADR-0040 multi-layer test gate (PR-T3 / 门禁层): nx-server-specific
# build/test/lint jobs移到 pr-validation.yml 的 `validate-and-test` mega-job
# (跑 `nx affected -t lint typecheck test build runtime-smoke`). This file
# keeps only the workflow-level gates that operate outside nx (gitleaks scans
# commit history, actionlint validates GH workflow YAML, pr-title validates
# PR metadata, docker-image scans the built image on push-to-main).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  actionlint:
    name: Actionlint (workflow YAML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: raven-actions/actionlint@v2

  pr-title:
    name: PR title (conventional commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # V9 acceptance gate (Plan 1 § E.3): Docker build + Trivy image scan.
  # Trigger strategy: PR skip / main push run.
  # Rationale: image scan ~3-5min, no PR-time value (Dockerfile rarely changes
  # per PR; native deps caught by pr-validation runtime-smoke). main push
  # catches base-image / transitive CVE on the merged commit within revert
  # window. Not in ruleset required_status_checks. nightly cron is follow-up.
  docker-image:
    name: Docker build + Trivy image scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/server/Dockerfile
          load: true
          tags: nvy/server:ci
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: nvy/server:ci
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

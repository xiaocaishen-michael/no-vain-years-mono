name: Nightly Sweep

# Per ADR-0040 multi-layer test gate (PR-T3 / 门禁层 / 兜底扫雷).
# Daily full-monorepo sweep with `--skip-nx-cache` to catch:
#   - nx cache 假绿 (cache hash collision / stale cache surviving genuine
#     break) — empirically demonstrated in PR #79 orchestrator lint regression
#   - environment drift (Docker image / Node version / pnpm registry / etc.)
#   - cross-project breakage missed by `nx affected` due to undeclared deps
#
# Runs `nx run-many --all --skip-nx-cache` (NOT affected — explicitly
# bypasses both caching and incremental selection). Failure auto-creates
# a GitHub issue tagged `bug` linking to the failed run.

on:
  schedule:
    # 19:00 UTC = 03:00 Beijing (off-peak; gives 6h before next active dev day)
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sweep:
    name: sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/server
        run: npx prisma generate

      - name: Run Full Pipeline (No Cache)
        run: pnpm exec nx run-many -t lint typecheck test build runtime-smoke --all --skip-nx-cache

      - name: Create Alert Issue on Failure
        if: failure()
        run: |
          gh issue create \
            --title "🚨 Nightly Sweep Failed: Environment Drift Detected" \
            --body "Nightly --skip-nx-cache run RED. Possible causes: nx cache shadowing real break / env drift / undeclared cross-project dep. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "bug"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

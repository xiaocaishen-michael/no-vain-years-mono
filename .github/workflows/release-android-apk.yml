name: Release Android APK (EAS)

# Build a signed Android APK on EAS Cloud when release-please cuts a
# `mobile-vX.Y.Z` tag (apps/mobile component), then attach the .apk to that
# tag's GitHub Release. Mirrors deploy-web.yml's trigger so web + apk ship
# together at the same mobile component version (per ADR-0042 + ADR-0044).
#
# Version alignment (ADR-0044 §4, appVersionSource: remote):
#   - expo.version (display / versionName) is written by release-please into
#     app.json BEFORE this tag exists → EAS reads it as-is, never mutates it.
#   - android.versionCode is owned by EAS's remote counter (autoIncrement) →
#     bumps server-side per build, no git churn. So web + apk share the same
#     display version; the build number lives only on EAS.
#
# Why CI (GHA runner) instead of a local build: the runner is outside CN, so
# the EAS Cloud upload is not subject to the GFW slowness that hampers local
# `eas build` (per memory feedback_china_network_prefer_domestic_proxy). EAS
# still does the actual native build on its servers; we only orchestrate.
#
# Manual prerequisite (one-time, owner-only): a repo secret EXPO_TOKEN — a
# robot access token from expo.dev → Account Settings → Access Tokens. eas
# reads EXPO_TOKEN for non-interactive auth (no `eas login`). The signing
# keystore is EAS-managed (generated by the first manual build), so no
# keystore secret is needed here.

on:
  push:
    tags: ['mobile-v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing mobile-vX.Y.Z tag to (re)build + attach the APK to'
        required: true
        type: string

permissions:
  contents: write # gh release upload writes the .apk asset to the Release

# Never cancel an in-flight EAS build (it costs a monthly build-quota slot and
# runs ~10-20 min on EAS servers); let concurrent tags queue instead.
concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apk:
    name: EAS build Android APK + attach to Release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target tag
        id: tag
        # push → the tag ref; workflow_dispatch → the required `tag` input.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve a mobile-v tag to build."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building APK for tag: $TAG"

      - uses: actions/checkout@v6
        with:
          # Build the exact released commit (the tag), not whatever main is at.
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS (Expo) auth
        # Installs eas-cli globally on the runner (NOT a project dependency, per
        # ADR-0044 §5) and wires EXPO_TOKEN. Pinned to satisfy eas.json
        # cli.version >=19.0.0.
        uses: expo/expo-github-action@v8
        with:
          eas-version: 20.0.0
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK on EAS (production profile, blocking)
        id: build
        working-directory: apps/mobile
        # --wait blocks until the cloud build finishes; --json (implies
        # --non-interactive) prints the finished build object(s). Parse the
        # build id defensively (array or object shape).
        run: |
          eas build --platform android --profile production --non-interactive --wait --json | tee build.json
          BUILD_ID=$(jq -r 'if type=="array" then .[0].id else .id end' build.json)
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "::error::Could not parse EAS build id from build.json"
            exit 1
          fi
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "EAS build finished: $BUILD_ID"

      - name: Download the .apk artifact
        id: apk
        working-directory: apps/mobile
        # build:download writes the application archive to cwd with an
        # EAS-generated filename → glob for it rather than assuming a name.
        run: |
          eas build:download --build-id "${{ steps.build.outputs.build_id }}" --non-interactive
          APK=$(find . -maxdepth 1 -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No .apk found after eas build:download"
            exit 1
          fi
          # Rename to a versioned, predictable asset name for the Release.
          DEST="no-vain-years-${{ steps.tag.outputs.tag }}.apk"
          mv "$APK" "$DEST"
          echo "path=apps/mobile/$DEST" >> "$GITHUB_OUTPUT"
          echo "Downloaded APK → $DEST"

      - name: Attach APK to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # --clobber overwrites the asset on re-run (workflow_dispatch / rerun).
        run: gh release upload "${{ steps.tag.outputs.tag }}" "${{ steps.apk.outputs.path }}" --clobber

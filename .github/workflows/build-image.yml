name: Build & Push Image

# Per ADR-0026 D5/D6 + ADR-0042 monorepo release strategy. Triggered when:
#   - a server release tag (server-v*.*.*) is pushed by release-please
#     (server component tag per ADR-0042 § include-component-in-tag)
#   - manually via workflow_dispatch (hotfix path; pick a tag/branch)
#
# Build the multi-stage Dockerfile (apps/server/Dockerfile) on the GHA
# runner (4-vCPU, fast disk), then push to Aliyun Container Registry
# (cn-shanghai) reusing the existing namespace (mbw_xcs/mbw-app)
# per ADR-0026 § A-Tight v2 资源复用 — drop-in image replacement so
# .env.production / docker-compose.tight.yml don't need to change image
# reference URL at cutover.
#
# ACR was chosen over ghcr.io because deploy (SWAS pulling) latency
# dominates user-perceived deploy time, and ACR intranet pull (~5s for
# 180MB) is 100x faster than ghcr.io's international-link pull (no
# docker-mirror covers ghcr.io).

on:
  push:
    tags: ['server-v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build (e.g. server-v0.1.5 or hotfix-x)'
        required: true
        type: string

permissions:
  contents: read

env:
  ACR_REGISTRY: crpi-uy44w7zpjef3f9w1.cn-shanghai.personal.cr.aliyuncs.com
  ACR_NAMESPACE: mbw_xcs
  ACR_REPOSITORY: mbw-app

jobs:
  build-and-push:
    name: Build & Push to Aliyun ACR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image tag
        id: tag
        # Tag arg from workflow_dispatch wins; otherwise use the pushed git tag
        # (GITHUB_REF_NAME e.g. server-v0.1.5). Strip the `server-` prefix per
        # ADR-0042 component-in-tag — image tag stays version-only (v0.1.5)
        # so existing .env.production MBW_VERSION references work after cutover
        # (image tag stays pure v0.X.Y per the existing image-tag schema).
        run: |
          RAW="${{ inputs.tag }}"
          if [[ -z "$RAW" ]]; then
            RAW="${GITHUB_REF_NAME}"
          fi
          # Strip server- prefix for image tag (release-please git tag carries
          # component prefix; ACR image tag does not).
          IMAGE_TAG="${RAW#server-}"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved git tag: ${RAW} → image tag: ${IMAGE_TAG}"

      # No mvn/JDK setup — mono is TS/pnpm/Nx; Dockerfile multi-stage builder
      # runs pnpm install + nx build + prisma generate inside the container
      # against node:22-alpine base. Native bcrypt binding compiled there.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          # Build context = repo root (Dockerfile copies pnpm-workspace.yaml /
          # pnpm-lock.yaml / apps/server/ / packages/ from there).
          context: .
          file: apps/server/Dockerfile
          push: true
          # Two tags: version (immutable) + 'latest' (moving pointer to
          # current production). Production deploys reference the version tag
          # via .env.production MBW_VERSION; 'latest' is for ad-hoc local
          # pulls + drop-in replacement of the existing 'latest' tag (per
          # ADR-0026 § Cutover; existing latest gets overwritten when mono ships).
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}:latest
          # GHA cache speeds up subsequent runs (Docker layer reuse).
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Single architecture — SWAS is amd64. Multi-arch later if we
          # need ARM-based SWAS or local Apple Silicon dev push.
          platforms: linux/amd64

      - name: Image pushed
        run: |
          echo "✅ Image pushed:"
          echo "  ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}"
          echo "  ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}:latest"
